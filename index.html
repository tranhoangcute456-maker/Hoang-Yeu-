<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoàng 💕 Quỳnh</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

/* LOGIN */
#login{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

input{
    padding:10px;
    border:none;
    border-radius:20px;
    margin-top:10px;
    text-align:center;
}

button{
    margin-top:10px;
    padding:8px 20px;
    border:none;
    border-radius:20px;
    background:white;
    color:#ff4b5c;
    font-weight:bold;
    cursor:pointer;
}

/* MAIN */
.container{
    width:90%;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    display:none;
}

#typing{margin-top:10px;font-weight:bold;}
.secret{display:none;margin-top:10px;font-size:16px;}

/* Ring drop */
.ring{
    position:fixed;
    top:-100px;
    font-size:40px;
    animation:dropRing 2s ease forwards;
}
@keyframes dropRing{
    to{top:40%;transform:scale(1.5);}
}

/* Floating images */
.floating-img{
    position:fixed;
    bottom:-120px;
    width:80px;
    border-radius:15px;
    animation:floatUp linear infinite;
}
@keyframes floatUp{
    to{transform:translateY(-120vh);}
}

canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="login">
    <h2>Nhập mật khẩu để vào thế giới của chúng ta 💖</h2>
    <input type="password" id="password">
    <button onclick="checkPassword()">Vào 💕</button>
</div>

<audio id="bgMusic" loop>
    <source src="leduong.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainContent">
    <h1>Hoàng 💕 Quỳnh</h1>
    <h3>Yêu nhau từ 13 / 02 / 2026</h3>
    <div id="counter"></div>
    <div id="typing"></div>
    <div class="secret" id="secretMessage">
        🌹 Quỳnh à... Hoàng iu Quỳnh nhìu lém 💕
    </div>
</div>

<canvas id="fireworks"></canvas>

<script>
// PASSWORD
const correctPassword="13022026";
function checkPassword(){
    if(document.getElementById("password").value===correctPassword){
        login.style.display="none";
        mainContent.style.display="block";
        bgMusic.play();
        typeEffect();
    }else alert("Sai rồi 😝");
}

// COUNTER
const startDate=new Date("2026-02-13T00:00:00");
setInterval(()=>{
    const now=new Date();
    const days=Math.floor((now-startDate)/(1000*60*60*24));
    counter.innerHTML=days+" ngày yêu nhau 💕";
},1000);

// TYPE EFFECT
const text="Anh yêu em 💖";
let i=0;
function typeEffect(){
    if(i<text.length){
        typing.innerHTML+=text[i++];
        setTimeout(typeEffect,120);
    }
}

// FLOATING IMAGES - 4 ảnh bay lộn xộn
const images = ["anh1.jpg","anh2.jpg","anh3.jpg","anh4.jpg"];

setInterval(()=>{

    let usedPositions = [];

    for(let i=0;i<4;i++){

        const img=document.createElement("img");
        img.src = images[i % images.length];
        img.className="floating-img";

        // random vị trí ngang nhưng không trùng quá gần nhau
        let randomLeft;
        do{
            randomLeft = Math.random()*90; // 0 → 90vw
        }while(usedPositions.some(pos => Math.abs(pos - randomLeft) < 15));

        usedPositions.push(randomLeft);
        img.style.left = randomLeft + "vw";

        // random tốc độ
        img.style.animationDuration = (Math.random()*4+5)+"s";

        // random xoay nhẹ cho tự nhiên
        img.style.transform = "rotate(" + (Math.random()*20-10) + "deg)";

        document.body.appendChild(img);
        setTimeout(()=>img.remove(),10000);
    }

},3000);

// FIREWORKS REAL
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function firework(x,y){
    for(let i=0;i<60;i++){
        const angle=Math.random()*2*Math.PI;
        const speed=Math.random()*5+2;
        const dx=Math.cos(angle)*speed;
        const dy=Math.sin(angle)*speed;
        ctx.beginPath();
        ctx.arc(x,y,2,0,2*Math.PI);
        ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
        ctx.fill();
    }
}

function launchFireworks(){
    for(let i=0;i<5;i++){
        setTimeout(()=>{
            const x=Math.random()*canvas.width;
            const y=Math.random()*canvas.height/2;
            firework(x,y);
        },i*500);
    }
}

// CLICK 5 TIMES
let clickCount=0;
document.addEventListener("click",function(){
    clickCount++;
    if(clickCount===5){
        secretMessage.style.display="block";

        // rung điện thoại
        if(navigator.vibrate) navigator.vibrate(300);

        // tim rơi
        const ring=document.createElement("div");
        ring.className="ring";
        ring.innerHTML="💕";
        ring.style.left="50%";
        ring.style.transform="translateX(-50%)";
        document.body.appendChild(ring);

        // pháo hoa
        launchFireworks();
    }
});
</script>

</body>
</html>
